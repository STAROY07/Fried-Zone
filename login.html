<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fried Zone</title>
    <link rel="icon" type="image/jpeg" href="images/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1569058242253-92a9c73f49cc?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 20px;
        }

        .auth-page::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--grad-dark);
            opacity: 0.85;
            z-index: 1;
        }

        .auth-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            border: var(--glass-border);
            text-align: center;
        }

        .auth-container .logo-img {
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            border-radius: 50%;
            border: 3px solid var(--clr-accent);
            padding: 5px;
            background: #fff;
        }

        .auth-container h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--clr-text);
        }

        .auth-container .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .auth-link {
            display: block;
            margin-top: 25px;
            color: var(--clr-text-muted);
            font-size: 0.95rem;
        }

        .auth-link a {
            color: var(--clr-primary);
            font-weight: 700;
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(230, 57, 70, 0.1);
            color: var(--clr-primary);
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(230, 57, 70, 0.2);
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-container reveal active">
            <a href="index.html"><img src="images/logo.jpg" alt="Fried Zone" class="logo-img"></a>
            <h2>Welcome Back</h2>
            <div class="error-msg" id="login-error">Invalid credentials</div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email or Username</label>
                    <input type="text" id="email" required placeholder="Email or Username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Log In</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const users = JSON.parse(localStorage.getItem('fz_users')) || [];

            // Special Admin Check
            const adminCreds = JSON.parse(localStorage.getItem('fz_adminCredentials')) || { email: 'admin', password: 'admin@123' };

            if ((email === adminCreds.email || email === 'admin') && password === adminCreds.password) {
                const user = { username: 'Admin', email: adminCreds.email, password: adminCreds.password };
                localStorage.setItem('fz_currentUser', JSON.stringify(user));
                window.location.href = 'admin.html';
                return;
            }

            const user = users.find(u => (u.email === email || u.username === email) && u.password === password);

            if (user) {
                localStorage.setItem('fz_currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                loginError.style.display = 'block';
                loginError.textContent = "Invalid username/email or password.";
            }
        });
    </script>
</body>

</html>
