<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fried Zone</title>
    <link rel="icon" type="image/jpeg" href="images/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 20px;
        }

        .auth-page::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--grad-dark);
            opacity: 0.85;
            z-index: 1;
        }

        .auth-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            border: var(--glass-border);
            text-align: center;
        }

        .auth-container .logo-img {
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            border-radius: 50%;
            border: 3px solid var(--clr-accent);
            padding: 5px;
            background: #fff;
        }

        .auth-container h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--clr-text);
        }

        .auth-container .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .auth-link {
            display: block;
            margin-top: 25px;
            color: var(--clr-text-muted);
            font-size: 0.95rem;
        }

        .auth-link a {
            color: var(--clr-primary);
            font-weight: 700;
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(230, 57, 70, 0.1);
            color: var(--clr-primary);
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(230, 57, 70, 0.2);
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-container reveal active">
            <a href="index.html"><img src="images/logo.jpg" alt="Fried Zone" class="logo-img"></a>
            <h2>Join the Zone</h2>
            <div class="error-msg" id="signup-error">Email already exists</div>
            <form id="signup-form">
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>
            <p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signup-form');
        const signupError = document.getElementById('signup-error');

        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const users = JSON.parse(localStorage.getItem('fz_users')) || [];

            // Check if email already exists
            if (users.find(u => u.email === email)) {
                signupError.style.display = 'block';
                signupError.textContent = "Email already exists. Please login.";
                return;
            }

            const newUser = {
                username,
                email,
                password,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('fz_users', JSON.stringify(users));
            localStorage.setItem('fz_currentUser', JSON.stringify(newUser));

            alert('Account created successfully!');
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
